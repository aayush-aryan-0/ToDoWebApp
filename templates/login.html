<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', filename='images/icon.png') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/styleLogin.css') }}">
    <title>Login</title>
</head>
<body>
    <header> {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="errors">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
    </header>
   
    <main>
        <div class="container">  
        <h2 class="word">Login</h2>
        
        <form action="{{ url_for('login.login') }}" method="post">
           

            <input class="textbox" type="text" name="username" placeholder="Enter Username" required>
            <input class="textbox" type="password" name="password" placeholder="Enter Password" required>
            
            <button class="btn" type="submit">Login</button>

             <div><p class="message">{{ message }}</p></div>
        </form>

        <p><a id="registerLink" href="{{ url_for('login.register') }}">Don't have an account? Register Here</a></p>
        </div>

    </main>
    
</body>
</html>
